# Synclair sync gate — keeps the whole Synclair layer (component catalog, pages
# map, knowledge manifest, host hygiene) in lockstep with the host code,
# automatically, on every PR. It is the CI half of the two ways to stay in sync
# (the manual half is the `component-cataloger` / `page-mapper` /
# `knowledge-harvester` / `existing-project-intake` skills — see
# handbook/catalog-sync).
#
# On a PR: a fast, diff-aware scan reports the Synclair work THIS PR introduces
# (uncataloged components, staled entries, unrendered items, routes missing from
# the pages map, docs missing from the knowledge manifest) as a sticky PR
# comment. When there are gaps AND an ANTHROPIC_API_KEY secret is present, the
# sync agent runs ON THE PR BRANCH and pushes the catalog / pages-map /
# knowledge commit back, so the hub shows the new items before merge. Engineers
# run nothing. Without the secret, only the advisory comment posts.
#
# This ships DORMANT: in a fresh clone / new-project mode (no host catalog) the
# gate exits after a no-op scan and posts nothing. It activates once
# `data/external-catalog.json` has host entries.
#
# ── Adapt to your topology ────────────────────────────────────────────────────
# This template assumes Synclair is the repo root (standalone / watcher, or a
# host that vendored Synclair at the root). Two edits per clone:
#   1. `paths:` below — add the path(s) to YOUR host source, e.g.
#      `- "src/**"` or `- "apps/myapp/**"`, so host changes trigger the gate.
#   2. If Synclair lives in a SUBDIRECTORY (embedded/co-located at ./synclair):
#      COPY THIS FILE to the HOST repo's root `.github/workflows/` (GitHub only
#      runs workflows from the repo root), then prefix the script path and the
#      sync-agent prompt paths with `synclair/`, and add your host dir to
#      `paths:`. The script itself auto-detects the repo root, so no code
#      change is needed — only these YAML paths.
name: Synclair sync gate

on:
  pull_request:
    # The cheap gate scan runs on every push (synchronize); the sync agent job
    # fires only on opened / reopened / ready-for-review (see its `if:`), so it
    # lands one commit at a natural pause instead of racing each push.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "data/external-catalog.json"
      - "data/pages-map.json"
      - "lib/system/knowledge/sources.ts"
      - "components/host-previews/**"
      # + add your host source path(s) here, e.g. "src/**".

permissions:
  contents: write
  pull-requests: write
  id-token: write # claude-code-action authenticates via OIDC

concurrency:
  group: synclair-catalog-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      has_gaps: ${{ steps.gate.outputs.has_gaps }}
      has_catalog: ${{ steps.gate.outputs.has_catalog }}
      gap_files: ${{ steps.gate.outputs.gap_files }}
      page_gaps: ${{ steps.gate.outputs.page_gaps }}
      knowledge_gaps: ${{ steps.gate.outputs.knowledge_gaps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collect changed files vs base
        run: git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/changed.txt

      - name: Diff-aware sync scan
        id: gate
        run: node scripts/ci-pr-catalog-check.mjs /tmp/changed.txt

      # Dormant in blank / new-project clones: only comment where a host catalog
      # exists (so the foundation's own PRs stay quiet).
      - name: Post sticky PR comment
        if: steps.gate.outputs.has_catalog == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --edit-last --create-if-none \
            --body-file "${{ steps.gate.outputs.comment_path }}"

  sync:
    needs: gate
    # Only when there's real work AND the PR is non-draft at a "ready" moment —
    # never on a mid-iteration push, so the bot's commit doesn't race the
    # engineer's. Skips entirely without the ANTHROPIC_API_KEY secret.
    if: >
      needs.gate.outputs.has_gaps == 'true' &&
      github.event.pull_request.draft == false &&
      (github.event.action == 'opened' ||
       github.event.action == 'reopened' ||
       github.event.action == 'ready_for_review')
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Skip notice (no API key)
        if: env.HAS_KEY != 'true'
        run: echo "::notice::ANTHROPIC_API_KEY secret not set — auto-sync skipped. Gaps are listed in the PR comment; fix manually with the component-cataloger / page-mapper / knowledge-harvester skills, or add the secret."

      - uses: actions/checkout@v4
        if: env.HAS_KEY == 'true'
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run the sync agent on this branch
        if: env.HAS_KEY == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Use the workflow's own token — no Claude GitHub App install required.
          github_token: ${{ github.token }}
          # Paths below are repo-root-relative (Synclair at the root). If Synclair
          # is embedded at ./synclair, prefix each with `synclair/`.
          prompt: |
            You are running the Synclair sync gate on a PR branch of this repo.
            The diff-aware scan found Synclair-layer work this PR introduces.
            Any list may be empty — do only the work that is listed, nothing else.

            Component files to catalog or refresh (repo-root-relative):
            ${{ needs.gate.outputs.gap_files }}
            Route files missing from the pages map:
            ${{ needs.gate.outputs.page_gaps }}
            Docs missing from the knowledge manifest:
            ${{ needs.gate.outputs.knowledge_gaps }}

            1. COMPONENTS — follow .claude/agents/component-cataloger.md and the
               schema in lib/system/external.ts exactly. For each listed file not
               yet in data/external-catalog.json: read the source fully, derive
               props from the types, decide the tier (component/block/template —
               read .claude/agents/tier-arbiter.md if unsure), grep the host for
               real usage, compute the sha256 sourceHash, and add the entry
               (catalogedAt = today). For files that already have an entry:
               refresh sourceHash and catalogedAt; touch description/notes only
               if the change matters. For every entry you ADDED: write a Path A
               live-import preview scene in
               components/host-previews/<name>.preview.tsx (import the host's
               real component via the @host/* alias, matching the existing
               *.preview.tsx files) and register it in
               components/host-previews/registry.tsx.
            2. PAGES — for each listed route file, add a node to
               data/pages-map.json following the enumeration and id rules in
               .claude/agents/page-mapper.md and the PagesMap schema in
               lib/system/pages-map.ts exactly (route groups dropped, [dynamic]
               segments kept, slugifyRoute ids, per-page source hashes as the
               schema requires).
            3. KNOWLEDGE — for each listed doc, add a KnowledgeSource entry to
               lib/system/knowledge/sources.ts per the rules in
               .claude/agents/knowledge-harvester.md (kind/area from the doc
               itself, access "linked", host-relative path in notes; LINK the
               source — never copy its contents into the repo).
            4. HYGIENE — if any host source files changed in this PR, refresh
               data/host-hygiene.json by running `npm run scan:hygiene` from the
               Synclair app root.
            5. VERIFY — from the Synclair app root run
               `node scripts/check-host-drift.mjs`,
               `node scripts/check-host-coverage.mjs`, and
               `node scripts/check-pages.mjs`. Everything you touched must come
               back fresh: no stale entries, nothing documented-but-not-rendered,
               no NEW/REMOVED routes left for the pages this PR touches.
            Do not commit — the workflow commits after you. Keep changes limited
            to data/external-catalog.json, components/host-previews/,
            data/pages-map.json, data/host-hygiene.json, and
            lib/system/knowledge/sources.ts.
          claude_args: '--max-turns 100 --allowedTools "Bash,Read,Glob,Grep,Edit,MultiEdit,Write"'

      - name: Commit and push sync updates
        if: env.HAS_KEY == 'true'
        run: |
          git config user.name "synclair-sync-bot"
          git config user.email "noreply@anthropic.com"
          for p in data/external-catalog.json components/host-previews data/pages-map.json data/host-hygiene.json lib/system/knowledge/sources.ts; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "Sync agent made no changes."
          else
            git commit -m "Synclair: sync updates for this PR (automated)

          Generated by the synclair-catalog workflow: catalog entries, preview
          scenes, pages-map nodes, and knowledge-manifest entries for what this
          PR introduced or touched."
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi
